<nav class="navbar" [class.navbar--scrolled]="isScrolled()">
    <div class="nav-inner">

        <!-- Logo -->
        <a href="/" (click)="goHome(); $event.preventDefault()" class="nav-logo" id="nav-logo">
            &lt;Mohamed Majd Eddine Abbassi/&gt;
        </a>

        <!-- Desktop center links -->
        <div class="nav-links">
            @for (link of navLinks; track link.href) {
            <a [href]="link.href" (click)="navigateTo(link); $event.preventDefault()"
                class="nav-link" [id]="'nav-' + link.fragment">
                {{ i18n.t(link.labelKey) }}
            </a>
            }
        </div>

        <div class="nav-controls">
            <div class="lang-switch" role="group" aria-label="Language selector">
                <button
                    class="lang-dot"
                    type="button"
                    [class.lang-dot--active]="currentLang() === 'en'"
                    (click)="setLanguage('en')"
                    aria-label="English"
                    title="English"
                >
                    <span class="lang-dot-flag">🇬🇧</span>
                </button>
                <button
                    class="lang-dot"
                    type="button"
                    [class.lang-dot--active]="currentLang() === 'fr'"
                    (click)="setLanguage('fr')"
                    aria-label="Français"
                    title="Français"
                >
                    <span class="lang-dot-flag">🇫🇷</span>
                </button>
            </div>

            <button
                class="theme-switch-v2"
                type="button"
                (click)="toggleTheme()"
                [class.theme-switch-v2--dark]="isDarkMode()"
                [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
                [attr.title]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
            >
                <span class="theme-side">☀️</span>
                <span class="theme-side">🌙</span>
                <span class="theme-thumb-v2" aria-hidden="true"></span>
            </button>
        </div>

        <!-- Desktop CTA -->
        <a href="mailto:majdabbassi11@gmail.com" class="nav-cta" id="nav-hire-btn">
            {{ i18n.t('nav.workWithMe') }}
        </a>

        <!-- Mobile hamburger -->
        <button class="nav-hamburger" (click)="toggleMobileMenu()"
            id="nav-mobile-toggle" [attr.aria-label]="i18n.t('nav.toggleMenu')">
            <span [style.transform]="isMobileMenuOpen() ? 'rotate(45deg) translateY(7px)' : 'none'"></span>
            <span [style.opacity]="isMobileMenuOpen() ? '0' : '1'"></span>
            <span [style.transform]="isMobileMenuOpen() ? 'rotate(-45deg) translateY(-7px)' : 'none'"></span>
        </button>

    </div>

    <!-- Mobile menu -->
    @if (isMobileMenuOpen()) {
    <div class="nav-mobile-panel">
        <div class="nav-mobile-inner">
            @for (link of navLinks; track link.href) {
            <a [href]="link.href" (click)="navigateTo(link); $event.preventDefault()"
                class="nav-mobile-link">
                {{ i18n.t(link.labelKey) }}
            </a>
            }
            <div class="nav-mobile-controls">
                <div class="lang-switch" role="group" aria-label="Language selector">
                    <button
                        class="lang-dot"
                        type="button"
                        [class.lang-dot--active]="currentLang() === 'en'"
                        (click)="setLanguage('en')"
                        aria-label="English"
                    >
                        <span class="lang-dot-flag">🇬🇧</span>
                    </button>
                    <button
                        class="lang-dot"
                        type="button"
                        [class.lang-dot--active]="currentLang() === 'fr'"
                        (click)="setLanguage('fr')"
                        aria-label="Français"
                    >
                        <span class="lang-dot-flag">🇫🇷</span>
                    </button>
                </div>

                <button
                    class="theme-switch-v2"
                    type="button"
                    (click)="toggleTheme()"
                    [class.theme-switch-v2--dark]="isDarkMode()"
                    [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
                >
                    <span class="theme-side">☀️</span>
                    <span class="theme-side">🌙</span>
                    <span class="theme-thumb-v2" aria-hidden="true"></span>
                </button>
            </div>
            <a href="mailto:majdabbassi11@gmail.com" class="nav-cta" id="nav-mobile-hire">
                {{ i18n.t('nav.workWithMe') }}
            </a>
        </div>
    </div>
    }
</nav>
