<section id="philosophy" class="section-padding" style="background: var(--color-surface)">
    <div class="section-container">

        <!-- Header -->
        <div class="mb-16" appFadeIn>
            <p class="section-label">05 — Philosophy</p>
            <h2 class="section-title">Engineering <span class="gradient-text">Philosophy</span></h2>
            <p class="section-subtitle">
                The principles that guide every architectural decision I make.
            </p>
        </div>

        <!-- Principles Grid -->
        <div class="phil-grid">
            @for (principle of principles; track principle.id) {
            <div class="phil-card" appFadeIn [id]="principle.id">
                
                <!-- Icon -->
                <div class="phil-icon">
                    {{ principle.icon }}
                </div>

                <!-- Title -->
                <h3 class="phil-title">{{ principle.title }}</h3>

                <!-- Description -->
                <p class="phil-desc">{{ principle.description }}</p>
                
            </div>
            }
        </div>
    </div>
</section>
